name: Proxy Node Crawler

on:
  schedule:
    - cron: '0 */5 * * *'  # 每5小时运行
  workflow_dispatch:       # 允许手动触发

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
      
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Create required directories
      run: |
        mkdir -p database logs output
        touch database/.gitkeep
        
    - name: Run crawler
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      timeout-minutes: 45
      run: |
        python -m crawler.main
        
    - name: Commit ONLY output files (skip large database)
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # 只添加 output 目录
        git add output/
        
        # 有更改则提交推送
        git diff --quiet && git diff --staged --quiet || (
          git commit -m "chore: update proxy nodes $(date '+%Y-%m-%d %H:%M')" &&
          git push
        )
        
    - name: Upload database as artifact (7-day backup)
      uses: actions/upload-artifact@v4
      with:
        name: nodes-database-backup
        path: database/nodes.db
        retention-days: 7
        if-no-files-found: ignore
