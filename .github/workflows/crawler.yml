name: Proxy Node Crawler (Ultimate Single Job)

on:
  schedule:
    - cron: '0 */6 * * *'  # 每 6 小时运行一次
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 🔥 6 小时超时，确保能验证大量节点
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
      
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Create directories
      run: |
        mkdir -p database logs output
        touch database/.gitkeep
        
    - name: Run Ultimate Crawler
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        python -m crawler.main
        
    - name: Commit results
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        git update-index --assume-unchanged database/nodes.db 2>/dev/null || true
        git add output/
        
        git diff --quiet && git diff --staged --quiet || (
          git commit -m "chore: update proxy nodes $(date '+%Y-%m-%d %H:%M')" &&
          git push origin main --force-with-lease
        )
