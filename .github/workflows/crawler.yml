# .github/workflows/crawler.yml

name: Proxy Node Crawler

on:
  schedule:
    - cron: '0 */5 * * *'  # 每5小时
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
      
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Create directories
      run: |
        mkdir -p database logs output
        touch database/.gitkeep  # 保持目录结构
        
    - name: Run crawler
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      timeout-minutes: 45
      run: |
        python -m crawler.main
        
    - name: Commit ONLY output files (not database)
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # 🔥 只添加 output 目录，排除 database
        git add output/
        
        # 如果有更改则提交
        git diff --quiet && git diff --staged --quiet || (
          git commit -m "chore: update proxy nodes $(date '+%Y-%m-%d %H:%M')" &&
          git push
        )
        
    - name: Upload artifacts (optional backup)
      uses: actions/upload-artifact@v4
      with:
        name: proxy-nodes-backup
        path: |
          output/
          database/nodes.db  # 作为 artifact 保存7天，不提交到仓库
        retention-days: 7
