name: Proxy Node Crawler (Archive & Refill)

on:
  schedule:
    - cron: '0 */6 * * *'  # 每 6 小时自动运行一次
  workflow_dispatch:       # 允许手动触发

permissions:
  contents: write

jobs:
  crawl-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6小时最大运行时间，确保充足验证时间
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
      
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Create required directories
      run: |
        mkdir -p database logs output archives
        touch database/.gitkeep
        touch archives/.gitkeep
        
    - name: Run Ultimate Crawler
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        python -m crawler.main
        
    - name: Commit results & archives
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # 🔥 忽略数据库文件（避免超过 100MB 限制）
        git update-index --assume-unchanged database/nodes.db 2>/dev/null || true
        git reset database/nodes.db 2>/dev/null || true
        
        # 🔥 关键修改：同时提交 output 和 archives 目录
        git add output/ archives/
        
        # 仅在检测到变更时提交推送
        if ! git diff --cached --quiet; then
          echo "📝 Changes detected, preparing to commit..."
          
          # 拉取最新代码防止冲突
          git pull --rebase --autostash origin main 2>/dev/null || true
          
          git commit -m "chore: update nodes & archives $(date '+%Y-%m-%d %H:%M')"
          git push origin main --force-with-lease
          echo "✅ Pushed successfully."
        else
          echo "✅ No changes to commit."
        fi
