name: Proxy Node Crawler (Enhanced)

on:
  schedule:
    # 每5小时运行一次
    - cron: '0 */5 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl-and-validate:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Create database directory
      run: mkdir -p database
        
    - name: Run crawler with validation
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        python -m crawler.main
        
    - name: Commit database and output
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add output/ database/
        git diff --quiet && git diff --staged --quiet || (
          git commit -m "Update nodes $(date '+%Y-%m-%d %H:%M') - $(grep 'valid' output/STATS.md | head -1)" &&
          git push
        )
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: proxy-nodes-validated
        path: |
          output/
          database/
        retention-days: 7
