name: Proxy Node Crawler (Parallel 8x - FIXED MERGE)

on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl-shards:
    strategy:
      matrix:
        shard: [0, 1, 2, 3, 4, 5, 6, 7]
      fail-fast: false
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
      
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Create directories
      run: |
        mkdir -p database logs output shard-${{ matrix.shard }}
        touch database/.gitkeep
        
    - name: Run crawler (shard ${{ matrix.shard }})
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        python -m crawler.main --shard ${{ matrix.shard }} --skip-validate
        
    - name: Save shard output
      run: |
        cp -r output/* shard-${{ matrix.shard }}/ 2>/dev/null || true
        mv database/nodes.db shard-${{ matrix.shard }}/nodes_shard_${{ matrix.shard }}.db 2>/dev/null || true
        
    - name: Upload shard artifacts
      uses: actions/upload-artifact@v4
      with:
        name: shard-${{ matrix.shard }}-results
        path: shard-${{ matrix.shard }}/
        retention-days: 1


  merge-results:
    needs: crawl-shards
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
      
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Download all shard artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: shard-*-results
        path: downloaded-shards
        # 🔥 关键修复：移除 merge-multiple，防止同名文件互相覆盖
        # merge-multiple: true  <-- 已删除
    
    - name: 🔍 Debug: Check downloaded structure
      run: |
        echo "Downloaded structure:"
        find downloaded-shards -type f -name "*.txt" | head -20
        
    - name: Merge databases
      run: |
        mkdir -p database output
        python3 -c "
        import sqlite3
        from pathlib import Path
        main_db = 'database/nodes.db'
        shard_dbs = list(Path('downloaded-shards').glob('*/nodes_shard_*.db'))
        Path('database').mkdir(exist_ok=True)
        if shard_dbs:
            print(f'🔗 Merging {len(shard_dbs)} databases...')
            from crawler.deduplicator import NodeDeduplicator
            dedup = NodeDeduplicator(main_db)
            dedup.merge_databases([str(p) for p in shard_dbs])
            stats = dedup.get_stats()
            print(f'✅ DB: total={stats.get(\"total\", 0)}, valid={stats.get(\"valid\", 0)}')
        "
        
    - name: Merge output files (ROBUST VERSION)
      run: |
        python3 << 'PYTHON_SCRIPT'
        from pathlib import Path
        from datetime import datetime
        import json

        output_dir = Path('output')
        output_dir.mkdir(exist_ok=True)
        
        print("🔍 Starting robust merge...")
        
        # 1. 找到所有分片目录
        shard_dirs = list(Path('downloaded-shards').glob('shard-*-results'))
        print(f"   Found {len(shard_dirs)} shard directories.")
        
        protocol_stats = {}
        total_links = 0
        
        # 协议列表
        protocols = ['vless', 'hysteria2', 'tuic', 'trojan', 'shadowsocks', 'naiveproxy', 'shadowtls', 'anytls']
        
        for proto in protocols:
            all_links = set()
            
            # 遍历每个分片目录
            for shard_dir in shard_dirs:
                proto_file = shard_dir / f"{proto}_sub.txt"
                if proto_file.exists():
                    try:
                        content = proto_file.read_text(encoding='utf-8', errors='ignore')
                        links = [l.strip() for l in content.split('\n') if l.strip() and '://' in l]
                        if links:
                            print(f"   📄 {shard_dir.name}/{proto}_sub.txt: {len(links)} links")
                            all_links.update(links)
                    except Exception as e:
                        print(f"   ⚠️  Error reading {proto_file}: {e}")
            
            # 写入合并后的文件
            if all_links:
                (output_dir / f'{proto}_sub.txt').write_text('\n'.join(sorted(all_links)))
                protocol_stats[proto.upper()] = len(all_links)
                total_links += len(all_links)
                print(f"   ✅ Merged {proto}_sub.txt: {len(all_links)} total links")
            else:
                print(f"   ⚠️  No links found for {proto}")
                (output_dir / f'{proto}_sub.txt').write_text('') # 创建空文件占位

        # 2. 生成 all_sub.txt (所有协议合并)
        print("\n🔗 Generating all_sub.txt...")
        all_links_global = set()
        
        for proto_file in output_dir.glob('*_sub.txt'):
            if proto_file.name == 'all_sub.txt': continue
            try:
                content = proto_file.read_text(encoding='utf-8', errors='ignore')
                links = [l.strip() for l in content.split('\n') if l.strip() and '://' in l]
                all_links_global.update(links)
            except: pass
            
        if all_links_global:
            (output_dir / 'all_sub.txt').write_text('\n'.join(sorted(all_links_global)))
            print(f"   ✅ all_sub.txt: {len(all_links_global)} total links")
        else:
            print(f"   ⚠️  all_sub.txt is empty")
            (output_dir / 'all_sub.txt').write_text('')

        # 3. 生成统计报告
        stats_lines = [
            '# Proxy Nodes Report',
            f'**Last Updated:** {datetime.now().strftime("%Y-%m-%d %H:%M:%S")}',
            f'**Total Nodes:** {total_links}',
            '',
            '## Protocol Statistics:',
            ''
        ]
        for proto, count in sorted(protocol_stats.items()):
            stats_lines.append(f'- {proto}: {count}')
            
        (output_dir / 'STATS.md').write_text('\n'.join(stats_lines))
        print("\n✅ Merge completed successfully.")
        PYTHON_SCRIPT
        
    - name: Fix git state
      run: |
        git update-index --assume-unchanged database/nodes.db 2>/dev/null || true
        git reset database/nodes.db 2>/dev/null || true
        rm -rf downloaded-shards/ shard-*/ 2>/dev/null || true
        git add output/*.txt output/*.json output/*.md 2>/dev/null || true
        
    - name: Pull before push
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git pull --rebase --autostash origin main 2>/dev/null || true
        
    - name: Commit merged results
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        if ! git diff --cached --quiet; then
          echo "📝 Committing changes..."
          git pull --rebase --autostash origin main 2>/dev/null || true
          git commit -m "chore: merge 8-shard results (fixed overwrite bug) $(date '+%Y-%m-%d %H:%M')"
          git push origin main --force-with-lease
        else
          echo "✅ No changes to commit"
        fi
