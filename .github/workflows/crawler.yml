name: Proxy Node Crawler (Parallel 8x)

on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl-shards:
    strategy:
      matrix:
        shard: [0, 1, 2, 3, 4, 5, 6, 7]
      fail-fast: false
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
      
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Create directories
      run: |
        mkdir -p database logs output shard-${{ matrix.shard }}
        touch database/.gitkeep
        
    - name: Run crawler (shard ${{ matrix.shard }})
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        python -m crawler.main --shard ${{ matrix.shard }} --skip-validate
        
    - name: Save shard output
      run: |
        cp -r output/* shard-${{ matrix.shard }}/ 2>/dev/null || true
        mv database/nodes.db shard-${{ matrix.shard }}/nodes_shard_${{ matrix.shard }}.db 2>/dev/null || true
        
    - name: Upload shard artifacts
      uses: actions/upload-artifact@v4
      with:
        name: shard-${{ matrix.shard }}-results
        path: shard-${{ matrix.shard }}/
        retention-days: 1


  merge-results:
    needs: crawl-shards
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
      
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Download all shard artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: shard-*-results
        path: downloaded-shards
        merge-multiple: true
        
    - name: Merge databases and outputs
      run: |
        mkdir -p database output
        
        python << 'MERGE_SCRIPT'
        import sqlite3
        from pathlib import Path
        
        main_db = "database/nodes.db"
        shard_dbs = list(Path("downloaded-shards").glob("*/nodes_shard_*.db"))
        
        Path("database").mkdir(exist_ok=True)
        
        if not shard_dbs:
            print("⚠️ No shard databases found")
            conn = sqlite3.connect(main_db)
            conn.execute("CREATE TABLE IF NOT EXISTS nodes (id INTEGER PRIMARY KEY)")
            conn.commit()
            conn.close()
        else:
            print(f"🔗 Merging {len(shard_dbs)} shard databases...")
            from crawler.deduplicator import NodeDeduplicator
            dedup = NodeDeduplicator(main_db)
            dedup.merge_databases([str(p) for p in shard_dbs])
            stats = dedup.get_stats()
            print(f"✅ Merge complete. Total: {stats.get('total', 0)}, Valid: {stats.get('valid', 0)}, Size: {stats.get('db_size_mb', 0):.2f} MB")
        MERGE_SCRIPT
        
        python << 'MERGE_OUTPUT'
        from pathlib import Path
        
        output_dir = Path("output")
        output_dir.mkdir(exist_ok=True)
        
        for proto in ['vless', 'hysteria2', 'tuic', 'trojan', 'shadowsocks', 'naiveproxy', 'shadowtls', 'anytls', 'all']:
            all_links = set()
            for sub_file in Path("downloaded-shards").glob(f"*/{proto}_sub.txt"):
                try:
                    content = sub_file.read_text(encoding='utf-8', errors='ignore')
                    links = [l.strip() for l in content.split('\n') if l.strip() and '://' in l]
                    all_links.update(links)
                except: pass
            if all_links:
                (output_dir / f"{proto}_sub.txt").write_text('\n'.join(sorted(all_links)))
                print(f"✅ Merged {proto}_sub.txt: {len(all_links)} links")
        
        from datetime import datetime
        stats_content = f"""# Proxy Nodes Report
Generated: {datetime.now().strftime("%Y-%m-%d %H:%M:%S")}
Mode: 8-shard parallel merge

## Summary
- Merged from 8 shards
- Output files generated in output/
"""
        (output_dir / "STATS.md").write_text(stats_content)
        print("✅ Generated STATS.md")
        MERGE_OUTPUT
        
    - name: Fix git state before commit
      run: |
        git update-index --assume-unchanged database/nodes.db 2>/dev/null || true
        git reset database/nodes.db 2>/dev/null || true
        rm -rf downloaded-shards/ shard-*/ 2>/dev/null || true
        git add output/*.txt output/*.json output/*.md 2>/dev/null || true
        
    - name: Commit merged results
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        if ! git diff --cached --quiet; then
          echo "📝 Changes detected, committing..."
          git commit -m "chore: merge 8-shard crawl results $(date '+%Y-%m-%d %H:%M')"
          git push
        else
          echo "✅ No changes to commit"
        fi
        
    - name: Cleanup artifacts
      uses: geekyeggo/delete-artifact@v2
      with:
        name: shard-*-results
      if: always()
